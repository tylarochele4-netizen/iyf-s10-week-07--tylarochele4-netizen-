<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Archive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Task Archive</h1>
            <p>Managing state and persistence.</p>
        </header>

        <section id="todo-section">
            <h2><span class="icon">📁</span> Permanent Records</h2>
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="Add a new task...">
                <button id="addBtn">Add</button>
            </div>

            <div class="filter-group">
                <button onclick="setFilter('all')">All</button>
                <button onclick="setFilter('active')">Active</button>
                <button onclick="setFilter('completed')">Completed</button>
            </div>

            <ul id="todoList">
                </ul>
        </section>

        <hr>

        <section id="contact-section">
            <h2><span class="icon">📝</span> Temporary Draft</h2>
            <p><small>Self-clears when you close the browser tab.</small></p>
            
            <form id="contact-form">
                <div class="field">
                    <label for="userName">Name</label>
                    <input type="text" id="userName" name="userName" placeholder="Your Name">
                </div>
                
                <div class="field">
                    <label for="userMessage">Quick Note</label>
                    <textarea id="userMessage" name="userMessage" placeholder="Type something..."></textarea>
                </div>
                
                <button type="submit" id="submitBtn">Submit Draft</button>
            </form>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
